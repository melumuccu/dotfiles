default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets
        entry: mise exec -- gitleaks git --pre-commit --redact --staged --verbose
        language: system
        pass_filenames: false
        stages:
          - pre-commit
      - id: gitleaks-push
        name: Detect hardcoded secrets before push
        entry: bash .pre-commit-hooks/gitleaks-pre-push.sh
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-push
