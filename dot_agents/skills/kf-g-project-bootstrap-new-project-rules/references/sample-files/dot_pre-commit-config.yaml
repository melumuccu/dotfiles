default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: gitleaks-pre-commit
        name: Detect hardcoded secrets
        entry: mise exec -- gitleaks git --pre-commit --redact --staged --verbose
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-commit
      - id: gitleaks-pre-push
        name: Detect hardcoded secrets before push
        entry: mise exec -- gitleaks git --redact --verbose
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-push
      - id: test-pre-push
        name: Run all tests before push
        entry: mise run test
        language: system
        pass_filenames: false
        always_run: true
        stages:
          - pre-push
